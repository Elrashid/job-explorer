<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f2ef;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #0a66c2;
    }
    #status {
      margin: 8px 0;
      font-size: 13px;
      color: #666;
      min-height: 20px;
    }
    #tab-list {
      max-height: 300px;
      overflow-y: auto;
      margin: 8px 0;
    }
    .tab-item {
      padding: 6px 8px;
      background: white;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-item.saved { border-left: 3px solid #057642; }
    .tab-item.error { border-left: 3px solid #cc1016; }
    .tab-item.pending { border-left: 3px solid #ddd; }
    button {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #004182; }
    button:disabled { background: #999; cursor: default; }
    .count { font-weight: 600; color: #0a66c2; }
  </style>
</head>
<body>
  <h2>LinkedIn Job Saver</h2>
  <div id="status">Scanning tabs...</div>
  <div id="tab-list"></div>
  <button id="save-btn" disabled>Save All</button>
  <script src="popup.js"></script>
</body>
</html>
